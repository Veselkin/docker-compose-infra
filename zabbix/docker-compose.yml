services:
  zabbix-db:
    image: mysql:8.0
    container_name: zabbix-db
    restart: unless-stopped
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_bin
      --innodb-buffer-pool-size=256M
      --innodb-redo-log-capacity=134217728
      --innodb-flush-log-at-trx-commit=2
      --max-connections=50
      --tmp-table-size=32M
      --max-heap-table-size=32M
    networks:
      - zabbix-net
    volumes:
      - ./mysql_data:/var/lib/mysql
    environment:
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=${ZABBIX_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${ZABBIX_DB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "zabbix", "-p${ZABBIX_DB_PASSWORD}"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 120s

  zabbix-server:
    image: zabbix/zabbix-server-mysql:latest
    container_name: zabbix-server
    restart: unless-stopped
    ports:
      - "10051:10051"
    networks:
      - zabbix-net
    volumes:
      - ./zabbix_server_data:/var/lib/zabbix
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_SERVER_HOST=zabbix-db
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=${ZABBIX_DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${ZABBIX_DB_ROOT_PASSWORD}
      # Ограничение кешей
      - ZBX_CACHESIZE=128M
      - ZBX_HISTORYCACHESIZE=32M
      - ZBX_HISTORYINDEXCACHESIZE=16M
      - ZBX_VALUECACHESIZE=32M
      # История и тренды — сколько дней хранить
      - ZBX_HOUSEKEEPINGFREQUENCY=1
      - ZBX_MAXHOUSEKEEPERDELETE=5000
      # Syncers
      - ZBX_STARTHISTORYSYNCERS=3
      # Pollers — уменьши если мало хостов
      - ZBX_STARTPOLLERS=3
      - ZBX_STARTPINGERS=1
      - ZBX_STARTTRAPPERS=3
    depends_on:
      zabbix-db:
        condition: service_healthy

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:latest
    container_name: zabbix-web
    restart: unless-stopped
    networks:
      - zabbix-net
      - traefik_proxy
    volumes:
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DB_SERVER_HOST=zabbix-db
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=${ZABBIX_DB_PASSWORD}
      - ZBX_SERVER_HOST=zabbix-server
      - ZBX_NGINX_SUBPATH=/zabbix
      # Ограничение PHP
      - PHP_TZ=Europe/Samara
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.zabbix.rule=Host(`${DOMAIN}`) && PathPrefix(`/zabbix`)"
      - "traefik.http.routers.zabbix.entrypoints=websecure"
      - "traefik.http.routers.zabbix.tls=true"
      - "traefik.http.routers.zabbix.tls.certresolver=le"
      - "traefik.http.middlewares.zabbix-strip.stripprefix.prefixes=/zabbix"
      - "traefik.http.routers.zabbix.middlewares=zabbix-strip"
      - "traefik.http.services.zabbix.loadbalancer.server.port=8080"
    depends_on:
      zabbix-db:
        condition: service_healthy

networks:
  zabbix-net:
    driver: bridge
  traefik_proxy:
    external: true